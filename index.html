<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Basketball-Scoreboard</h2>
    <div id="card">
        <div class="card-section">
            <h3 id="home">HOME</h3>
            <div class="score-card"><h1 id="home-score"></h1></div>
            <div class="score-buttons">
                <button class="score-btn" onclick="homeAddOne()" aria-label="Add 1 point to Home">+1</button>
                <button class="score-btn" onclick="homeAddTwo()" aria-label="Add 2 points to Home">+2</button>
                <button class="score-btn" onclick="homeAddThree()" aria-label="Add 3 points to Home">+3</button> 
            </div>
        </div>
        <div><button id="reset-btn" onclick="resetScore()" aria-label="Reset score for both teams to zero">Reset</button></div>
        <div class="card-section">
            <h3 id="guest">GUEST</h3>
            <div class="score-card"><h1 id="guest-score"></h1></div>
            <div class="score-buttons">
                <button class="score-btn" onclick="guestAddOne()" aria-label="Add 1 point to Guest">+1</button>
                <button class="score-btn" onclick="guestAddTwo()" aria-label="Add 2 points to Guest">+2</button>
                <button class="score-btn" onclick="guestAddThree()" aria-label="Add 3 points to Guest">+3</button>   
            </div>
        </div>
    </div>


 <script src="script.js"></script>   
</body>
</html>
