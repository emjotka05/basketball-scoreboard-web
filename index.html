<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Basketball-Scoreboard</h2>
    <div id="card">
        <div class="card-section">
            <h3>HOME</h3>
            <div class="score-card"><h1 id="home-score">0</h1></div>
            <div class="score-buttons">
                <button class="score-btn">+1</button>
                <button class="score-btn">+2</button>
                <button class="score-btn">+3</button> 
            </div>
        </div>
        <div><button id="reset-btn">Reset</button></div>
        <div class="card-section">
            <h3>GUEST</h3>
            <div class="score-card"><h1 id="guest-score">0</h1></div>
            <div class="score-buttons">
                <button class="score-btn">+1</button>
                <button class="score-btn">+2</button>
                <button class="score-btn">+3</button>   
            </div>
        </div>
    </div>


 <script src="script.js"></script>   
</body>
</html>
